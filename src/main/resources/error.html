<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lỗi – Quản lý lịch học</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
      <div class="mb-3" th:classappend="${status == 404} ? 'text-warning' : 'text-danger'">
        <i class="bi bi-exclamation-octagon-fill" style="font-size: 4rem;"
           th:classappend="${status == 404} ? 'bi-question-circle-fill' : ''"></i>
      </div>
      <h1 class="display-4 fw-bold text-dark" th:text="${status}">500</h1>
      <h5 class="text-muted mb-3" th:text="${error} ?: 'Lỗi máy chủ'">Lỗi máy chủ</h5>
      <p class="text-muted mb-4"
         th:text="${message != null and !#strings.isEmpty(message)} ? ${message} : 'Đã xảy ra lỗi. Vui lòng thử lại hoặc liên hệ quản trị viên.'">
      </p>
      <div class="d-flex gap-2 justify-content-center">
        <a href="/" class="btn btn-outline-secondary">
          <i class="bi bi-house me-1"></i> Trang chủ
        </a>
        <a href="/admin/room-types" class="btn btn-primary">
          <i class="bi bi-grid me-1"></i> Quản trị
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>

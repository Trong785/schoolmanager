<!doctype html>
<html lang="vi">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Quản lý Sinh Viên | School Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./adminlte/css/adminlte.css" />
    <link rel="stylesheet" href="./custom-theme.css" />
  </head>
  <body class="layout-fixed sidebar-expand-lg sidebar-open">
    <div class="app-wrapper">
      <nav class="app-header navbar navbar-expand">
        <div class="container-fluid">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                <i class="bi bi-list"></i>
              </a>
            </li>
            <li class="nav-item d-none d-md-block">
              <span class="nav-link fw-semibold">Quản lý Sinh Viên</span>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#" data-lte-toggle="fullscreen">
                <i data-lte-icon="maximize" class="bi bi-arrows-fullscreen"></i>
                <i data-lte-icon="minimize" class="bi bi-fullscreen-exit" style="display: none"></i>
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <div class="sidebar-brand">
          <a href="./index.html" class="brand-link">
            <img
              src="./adminlte/assets/img/AdminLTELogo.png"
              alt="AdminLTE Logo"
              class="brand-image opacity-75 shadow"
            />
            <span class="brand-text fw-light">School Manager</span>
          </a>
        </div>
        <div class="sidebar-wrapper">
          <nav class="mt-2">
            <ul
              class="nav sidebar-menu flex-column"
              data-lte-toggle="treeview"
              role="navigation"
              aria-label="Main navigation"
              data-accordion="false"
            >
              <li class="nav-item">
                <a href="./index.html" class="nav-link active">
                  <i class="nav-icon bi bi-people-fill"></i>
                  <p>Sinh viên</p>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </aside>

      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6">
                <h3 class="mb-0">Quản lý Sinh Viên</h3>
              </div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item"><a href="./index.html">Home</a></li>
                  <li class="breadcrumb-item active" aria-current="page">Danh sách sinh viên</li>
                </ol>
              </div>
            </div>
          </div>
        </div>

        <div class="app-content">
          <div class="container-fluid">
            <!-- Main Card -->
            <div class="card mb-4">
              <div class="card-header d-flex flex-wrap gap-2 align-items-center">
                <h3 class="card-title mb-0">Danh Sách Sinh Viên</h3>
                <button class="btn btn-primary ms-auto" id="btnAddStudent">
                  <i class="bi bi-plus-lg me-1"></i>Thêm Sinh Viên
                </button>
              </div>

              <!-- Search Section -->
              <div class="card-body border-bottom">
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-search"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control"
                    id="searchInput"
                    placeholder="Tìm kiếm theo tên hoặc email..."
                  />
                  <button class="btn btn-secondary" id="btnClearSearch">
                    <i class="bi bi-x-circle"></i>
                  </button>
                </div>
              </div>

              <!-- Table -->
              <div class="card-body table-responsive p-0">
                <table class="table table-hover mb-0">
                  <thead>
                    <tr>
                      <th style="width: 30%;">Tên</th>
                      <th style="width: 30%;">Email</th>
                      <th style="width: 15%;">Giới Tính</th>
                      <th style="width: 25%;" class="text-end">Hành Động</th>
                    </tr>
                  </thead>
                  <tbody id="studentTableBody">
                    <tr>
                      <td colspan="4" class="text-center text-muted py-4">
                        <i class="bi bi-inbox"></i><br>Chưa có dữ liệu. Nhấp <strong>Thêm Sinh Viên</strong> để bắt đầu.
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- Footer with pagination and info -->
              <div class="card-footer d-flex flex-wrap justify-content-between align-items-center gap-2">
                <div class="small text-secondary" id="statsInfo">0 sinh viên</div>
                <nav>
                  <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </nav>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">School Manager</div>
        <strong>Quản lý sinh viên </strong>
      </footer>
    </div>

    <!-- Add/Edit Modal -->
    <div
      class="modal fade"
      id="studentModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Thêm Sinh Viên</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="studentId" />
            <div class="mb-3">
              <label for="studentName" class="form-label">Tên Sinh Viên</label>
              <input
                type="text"
                class="form-control"
                id="studentName"
                placeholder="Nhập tên sinh viên"
                required
              />
            </div>
            <div class="mb-3">
              <label for="studentEmail" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="studentEmail"
                placeholder="Nhập email"
                required
              />
            </div>
            <div class="mb-3">
              <label for="studentGender" class="form-label">Giới Tính</label>
              <select class="form-control" id="studentGender" required>
                <option value="">-- Chọn Giới Tính --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Hủy
            </button>
            <button type="button" class="btn btn-primary" id="btnSaveStudent">
              Lưu
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./adminlte/js/adminlte.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const API_BASE = '/api/students';
        const PAGE_SIZE = 5;

        // DOM Elements
        const btnAddStudent = document.getElementById('btnAddStudent');
        const btnSaveStudent = document.getElementById('btnSaveStudent');
        const btnClearSearch = document.getElementById('btnClearSearch');
        const searchInput = document.getElementById('searchInput');
        const studentTableBody = document.getElementById('studentTableBody');
        const pagination = document.getElementById('pagination');
        const statsInfo = document.getElementById('statsInfo');
        const modalTitle = document.getElementById('modalTitle');
        const studentId = document.getElementById('studentId');
        const studentName = document.getElementById('studentName');
        const studentEmail = document.getElementById('studentEmail');
        const studentGender = document.getElementById('studentGender');

        let studentModal = new bootstrap.Modal(document.getElementById('studentModal'));
        let currentPage = 0;
        let totalPages = 0;
        let totalElements = 0;
        let isEditMode = false;

        // Load students
        async function loadStudents() {
          try {
            const keyword = searchInput.value.trim();
            let url = `${API_BASE}`;
            
            if (keyword) {
              url = `${API_BASE}/search?keyword=${encodeURIComponent(keyword)}&page=${currentPage}&size=${PAGE_SIZE}`;
            } else {
              console.log('Đang tải danh sách tất cả sinh viên...');
              const response = await fetch(url);
              
              if (!response.ok) {
                const errorText = await response.text();
                console.error('Load students error:', response.status, errorText);
                throw new Error(`HTTP ${response.status}: ${errorText || 'Lỗi khi tải dữ liệu'}`);
              }
              
              const allStudents = await response.json();
              console.log('Students loaded:', allStudents.length);
              renderTable(allStudents);
              statsInfo.textContent = allStudents.length + ' sinh viên';
              return;
            }
            
            console.log('Đang tìm kiếm sinh viên với từ khóa:', keyword);
            const response = await fetch(url);
            
            if (!response.ok) {
              const errorText = await response.text();
              console.error('Search students error:', response.status, errorText);
              throw new Error(`HTTP ${response.status}: ${errorText || 'Lỗi khi tìm kiếm'}`);
            }
            
            const data = await response.json();
            console.log('Search results:', data);
            totalPages = data.totalPages || 0;
            totalElements = data.totalElements || 0;
            renderTable(data.content || []);
            statsInfo.textContent = `${totalElements} sinh viên (trang ${currentPage + 1}/${totalPages})`;
          } catch (error) {
            console.error('Chi tiết lỗi tải dữ liệu:', error);
            alert('Lỗi: ' + error.message);
          }
        }

        function renderTable(students) {
          if (students.length === 0) {
            studentTableBody.innerHTML = `
              <tr>
                <td colspan="4" class="text-center text-muted py-4">
                  <i class="bi bi-search"></i><br>Không tìm thấy sinh viên nào
                </td>
              </tr>
            `;
            pagination.innerHTML = '';
            return;
          }

          studentTableBody.innerHTML = students.map(student => `
            <tr>
              <td>
                <a href="./student-detail.html?id=${student.id}" style="cursor: pointer; color: #007bff; text-decoration: underline;">
                  ${student.name || 'N/A'}
                </a>
              </td>
              <td>${student.email || 'N/A'}</td>
              <td>
                <span class="badge ${getGenderColor(student.gender)}">
                  ${student.gender || 'Chưa cập nhật'}
                </span>
              </td>
              <td class="text-end">
                <a class="btn btn-sm btn-outline-primary me-1" onclick="event.stopPropagation(); editStudent('${student.id}')" title="Chỉnh sửa">
                  <i class="bi bi-pencil-square"></i> Sửa
                </a>
                <a class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); deleteStudent('${student.id}')" title="Xóa">
                  <i class="bi bi-trash"></i> Xóa
                </a>
              </td>
            </tr>
          `).join('');

          if (searchInput.value.trim()) {
            renderPagination();
          } else {
            pagination.innerHTML = '';
          }
        }

        function getGenderColor(gender) {
          switch (gender) {
            case 'Nam':
              return 'bg-primary';
            case 'Nữ':
              return 'bg-danger';
            default:
              return 'bg-warning';
          }
        }

        function renderPagination() {
          if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
          }

          let html = '';
          html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(event, ${currentPage - 1})">&laquo;</a>
          </li>`;

          for (let i = 0; i < totalPages; i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
              <a class="page-link" href="#" onclick="changePage(event, ${i})">${i + 1}</a>
            </li>`;
          }

          html += `<li class="page-item ${currentPage === totalPages - 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(event, ${currentPage + 1})">&raquo;</a>
          </li>`;

          pagination.innerHTML = html;
        }

        window.changePage = function (event, page) {
          event.preventDefault();
          if (page >= 0 && page < totalPages) {
            currentPage = page;
            loadStudents();
          }
        };

        // Add student
        btnAddStudent.addEventListener('click', function () {
          isEditMode = false;
          modalTitle.textContent = 'Thêm Sinh Viên';
          studentId.value = '';
          studentName.value = '';
          studentEmail.value = '';
          studentGender.value = '';
          studentModal.show();
        });

        // Save student
        btnSaveStudent.addEventListener('click', async function () {
          const name = studentName.value.trim();
          const email = studentEmail.value.trim();
          const gender = studentGender.value.trim();

          if (!name || !email || !gender) {
            alert('Vui lòng điền đầy đủ thông tin');
            return;
          }

          try {
            const data = { name, email, gender };
            let response;

            if (isEditMode) {
              response = await fetch(`${API_BASE}/update/${studentId.value}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
              });
            } else {
              response = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
              });
            }

            if (!response.ok) {
              const errorText = await response.text();
              console.error('Server error:', response.status, errorText);
              throw new Error(`HTTP ${response.status}: ${errorText || 'Lỗi từ server'}`);
            }

            const result = await response.json();
            console.log('Save result:', result);
            
            studentModal.hide();
            currentPage = 0;
            searchInput.value = '';
            loadStudents();
            alert(isEditMode ? 'Cập nhật thành công!' : 'Thêm sinh viên thành công!');
          } catch (error) {
            console.error('Chi tiết lỗi lưu dữ liệu:', error);
            alert('Lỗi: ' + error.message);
          }
        });

        // Edit student
        window.editStudent = async function (id) {
          try {
            console.log('Đang tải dữ liệu sinh viên ID:', id);
            
            const response = await fetch(`${API_BASE}/${id}`);

            if (!response.ok) {
              const errorText = await response.text();
              console.error('Fetch student error:', response.status, errorText);
              throw new Error(`HTTP ${response.status}: ${errorText || 'Lỗi khi tải dữ liệu'}`);
            }

            const student = await response.json();
            console.log('Student data loaded:', student);

            isEditMode = true;
            modalTitle.textContent = 'Cập Nhật Sinh Viên';
            studentId.value = student.id;
            studentName.value = student.name || '';
            studentEmail.value = student.email || '';
            studentGender.value = student.gender || 'Nam';
            studentModal.show();
          } catch (error) {
            console.error('Chi tiết lỗi tải dữ liệu sinh viên:', error);
            alert('Lỗi: ' + error.message);
          }
        };

        // Delete student
        window.deleteStudent = async function (id) {
          if (!confirm('Bạn chắc chắn muốn xóa sinh viên này?')) {
            return;
          }

          try {
            console.log('Đang xóa sinh viên ID:', id);
            
            const response = await fetch(`${API_BASE}/delete/${id}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
            });

            console.log('Response status:', response.status);

            if (!response.ok) {
              const errorText = await response.text();
              console.error('Delete error:', response.status, errorText);
              throw new Error(`HTTP ${response.status}: ${errorText || 'Lỗi khi xóa'}`);
            }

            const result = await response.json();
            console.log('Delete result:', result);

            currentPage = 0;
            searchInput.value = '';
            await loadStudents();
            alert('Xóa sinh viên thành công!');
          } catch (error) {
            console.error('Chi tiết lỗi xóa dữ liệu:', error);
            alert('Lỗi: ' + error.message);
          }
        };

        // Search functionality
        searchInput.addEventListener('input', function () {
          currentPage = 0;
          loadStudents();
        });

        btnClearSearch.addEventListener('click', function () {
          searchInput.value = '';
          currentPage = 0;
          loadStudents();
        });

        // Load initial data
        loadStudents();
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layoutPage(pageTitle, content)">
<head th:replace="~{layout/fragments/header :: head(${pageTitle})}"></head>
<body>

  <!-- Header -->
  <div th:replace="~{layout/fragments/header :: header}"></div>

  <!-- Sidebar -->
  <div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>

  <!-- Main content -->
  <main class="app-main" id="appMain">
    <div class="flex-grow-1 p-4">
      <th:block th:replace="${content}"></th:block>
    </div>
    <div th:replace="~{layout/fragments/footer :: footer}"></div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Sidebar toggle script -->
  <script>
    (function () {
      const STORAGE_KEY = 'sidebarCollapsed';
      const sidebar  = document.getElementById('appSidebar');
      const main     = document.getElementById('appMain');
      const toggleBtn = document.getElementById('sidebarToggle');

      function isCollapsed() {
        return localStorage.getItem(STORAGE_KEY) === 'true';
      }

      function applyState(collapsed) {
        if (collapsed) {
          sidebar.classList.add('collapsed');
          main.classList.add('sidebar-collapsed');
        } else {
          sidebar.classList.remove('collapsed');
          main.classList.remove('sidebar-collapsed');
        }
      }

      // Restore saved state immediately (no flash)
      applyState(isCollapsed());

      toggleBtn.addEventListener('click', function () {
        const next = !isCollapsed();
        localStorage.setItem(STORAGE_KEY, next);
        applyState(next);
      });
    })();
  </script>

</body>
</html>
